name: "Phase 3 Mapping Mission"
description: |
  Pre-operational field mapping mission. Generates a lawnmower route from the
  Phase 2 field boundary and delegates all flight execution to
  obstacle_avoidance_runtime.

  Isaac flow: run this after Phase 2 writes perimeters/field_boundary.json.
  Do not keep another obstacle_avoidance_runtime launch running at the same
  time, because this launch starts the runtime as the single PX4 flight owner.

ros2_command: >
  source /opt/ros/jazzy/setup.bash &&
  source /home/tj/_Data/_Projekty/TJlabs/scout_ws/install/setup.bash &&
  ros2 launch scout_control mapping_mission.launch.py
    drone_count:=1
    altitude_m:=8.0
    line_spacing_m:=4.0
    side_overlap_pct:=30.0

extra_terminal_commands:
  - title: "Mapping Progress"
    command: >
      source /opt/ros/jazzy/setup.bash &&
      source /home/tj/_Data/_Projekty/TJlabs/scout_ws/install/setup.bash &&
      ros2 topic echo /swarm/mapping_progress
