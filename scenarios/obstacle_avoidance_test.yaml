name: "Obstacle Avoidance Test"
description: |
  Autonomni test obstacle avoidance — dron proleti 4 trasjektorie vedouci primo na prekazky,
  APF reaktivni avoidance je odkloní. Vyžaduje world: obstacle_course.

  POZOR — pred prvnim spustenim nainstaluj world soubor:
    colcon build && cp /home/tj/_Data/_Projekty/TJlabs/scout_ws/install/scout_control/share/scout_control/worlds/obstacle_course.world
       ~/PX4-Autopilot/Tools/simulation/gz/worlds/

  PX4 spustit s: PX4_GZ_WORLD=obstacle_course, model: gz_x500_mono_cam

  Mise (4 prulete):
    1. North Wall   — zed 6m siroka, NED(12,  0), cil NED(22,  0)
    2. East Poles   — 3 tyče, NED( 0, 12), cil NED( 0, 22)
    3. NE Building  — budova 4x4x9m, NED(9, 9),  cil NED(18, 18)
    4. NNW Fence    — plot 7m, NED(12,-8),         cil NED(22,-12)

  Vizualizace:
    - PointCloud + MarkerArray v RViz2: prekazky, planned path, actual path
    - Gimbal camera viewer (WSAD ovladani): /camera/image_raw
    - Dron zelen = volny let, cerven = avoidance aktivni

ros2_command: >
  source /opt/ros/jazzy/setup.bash &&
  source /home/tj/_Data/_Projekty/TJlabs/scout_ws/install/setup.bash &&
  ros2 launch scout_control obstacle_avoidance_test.launch.py

extra_terminal_commands:
  - title: "Gimbal Camera Viewer (WSAD)"
    command: >
      source /opt/ros/jazzy/setup.bash &&
      source /home/tj/_Data/_Projekty/TJlabs/scout_ws/install/setup.bash &&
      ros2 run scout_control gimbal_cam_viz --ros-args
        -p camera_topic:=/camera/image_raw
        -p pan_step_deg:=3.0
        -p tilt_step_deg:=2.0

  - title: "RViz2 — Obstacle Avoidance"
    command: >
      source /opt/ros/jazzy/setup.bash &&
      rviz2 -d /home/tj/_Data/_Projekty/TJlabs/scout_ws/install/scout_control/share/scout_control/config/obstacle_avoidance.rviz
      || rviz2
