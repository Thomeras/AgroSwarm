name: "Phase 1-5 E2E Mission — Manual Boundary Mapping"
description: |
  Produkční Phase 1-5 E2E flow pro Gazebo swarm.

  Setup je záměrně ruční:
    1. náhodně spawnuté drony ber jako staging, ne jako landing pady,
    2. jedním vybraným dronem ve Swarm Center postupně označ pad_0..pad_N,
    3. stejným dronem obleť hranici pole,
    4. mačkej B pro každý boundary vertex,
    5. F zavře polygon, vygeneruje grid a pošle RTH všem dronům na zmapované pady,
    6. po návratu/landing všech dronů potvrď mapping misi ve Swarm Center.

  Legacy/manual PX4 controllery nejsou součástí produkčního launch flow.
  obstacle_avoidance_runtime zůstává jediný flight owner. Headless setup bridge
  jen překládá povely ze Swarm Center na ROS2 setup topicy a neposílá PX4 setpointy.
world: "swarm_field"
ros2_command: "ros2 launch scout_control full_e2e_mission.launch.py world:={world} model:={model} drone_count:={drone_count} include_operator_tools:=true"
extra_terminal_commands: []
